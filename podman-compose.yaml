services:
  backend:
    build:
      context: ./oschertor/backend
      dockerfile+: |
        FROM python:3.12-slim
        WORKDIR /app
        COPY pyproject.toml uv.lock ./
        RUN pip install uv && uv sync --frozen
        COPY src/ ./src/
        COPY ../frontend/dist/ ./frontend/dist/
        ENV OBSIDIAN_VAULT_PATH=/tmp/vibeflow/agent/vault
        CMD ["uv", "run", "uvicorn", "main:get_app", "--factory", "--host", "0.0.0.0", "--port", "8080"]
    ports:
      - "8080:8080"
